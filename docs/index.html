<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jeongwoo Battle">
  <title>Jeongwoo Battle</title>
  <link rel="manifest" href="./manifest.webmanifest?v=16">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./styles.css?v=16">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" width="900" height="1500" aria-label="Jeongwoo Battle game screen"></canvas>

    <section id="startPanel" class="start-panel">
      <h1>Jeongwoo Battle</h1>
      <p>Choose your unit</p>
      <label>
        <span class="label">Unit</span>
        <select id="unitSelect">
          <option value="tank">Tank</option>
          <option value="jet">Jet</option>
          <option value="rover">Rover</option>
          <option value="ship">Ship</option>
          <option value="mech">Mech</option>
          <option value="drone">Drone</option>
          <option value="speeder">Speeder</option>
          <option value="walker">Walker</option>
        </select>
      </label>
      <section class="unit-card" aria-live="polite">
        <div>
          <span class="label">Selected Unit</span>
          <strong id="unitName">Tank</strong>
          <p id="unitRole">Balanced front-line unit</p>
        </div>
        <div id="statRows" class="stat-rows"></div>
        <div class="special-preview">
          <span class="label">Special</span>
          <strong id="specialName">Iron Barrage</strong>
          <p id="specialDescription">Launches a defensive missile burst.</p>
        </div>
      </section>
      <button id="startButton" class="primary-action" type="button">Start Game</button>
    </section>

    <section class="hud" aria-live="polite">
      <div>
        <span class="label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span class="label">Zone</span>
        <strong id="wave">Grass</strong>
      </div>
      <div>
        <span class="label">Power</span>
        <strong id="power">P1 M0 S0</strong>
      </div>
    </section>

    <section class="health">
      <div id="healthBar"></div>
    </section>
    <section class="special-meter" aria-label="Special skill energy">
      <div id="specialBar"></div>
    </section>

    <section id="gameOverPanel" class="end-panel" hidden>
      <h2>Game Over</h2>
      <strong id="finalScore">Score 0</strong>
      <label>
        <span class="label">Player Name</span>
        <input id="playerName" type="text" maxlength="14" value="Jeongwoo" autocomplete="off">
      </label>
      <button id="saveScoreButton" class="primary-action" type="button">Save Score</button>
      <span class="label">Score Ranking</span>
      <ol id="scoreList"></ol>
      <button id="restartButton" class="secondary-action" type="button">Play Again</button>
    </section>

    <div id="moveStick" class="stick" aria-label="Move joystick">
      <div id="moveKnob"></div>
    </div>
    <button id="shootButton" class="shoot" type="button" aria-label="Shoot">FIRE</button>
    <button id="specialButton" class="special" type="button" aria-label="Use special skill">SP</button>
  </main>

  <script src="./app.js?v=16" defer></script>
</body>
</html>
