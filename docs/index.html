<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="정우 배틀">
  <title>정우 배틀</title>
  <link rel="manifest" href="./manifest.webmanifest?v=20">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./styles.css?v=20">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" width="900" height="1500" aria-label="정우 배틀 게임 화면"></canvas>

    <section id="startPanel" class="start-panel">
      <h1>정우 배틀</h1>
      <p>캐릭터 선택</p>
      <label>
        <span class="label">캐릭터</span>
        <select id="unitSelect">
          <option value="tank">탱크</option>
          <option value="jet">전투기</option>
          <option value="rover">로버</option>
          <option value="ship">전함</option>
          <option value="mech">메카</option>
          <option value="drone">드론</option>
          <option value="speeder">스피더</option>
          <option value="walker">워커</option>
          <option value="phantom">팬텀</option>
          <option value="titan">타이탄</option>
          <option value="medic">메딕</option>
          <option value="artillery">포병</option>
          <option value="blade">블레이드</option>
          <option value="nova">노바</option>
        </select>
      </label>
      <section class="unit-card" aria-live="polite">
        <div>
          <span class="label">선택 캐릭터</span>
          <strong id="unitName">탱크</strong>
          <p id="unitRole">균형형 전방 유닛</p>
        </div>
        <div id="statRows" class="stat-rows"></div>
        <div class="special-preview">
          <span class="label">스페셜</span>
          <strong id="specialName">강철 포격</strong>
          <p id="specialDescription">방어막과 미사일 폭격을 사용합니다.</p>
        </div>
      </section>
      <button id="startButton" class="primary-action" type="button">게임 시작</button>
    </section>

    <section class="hud" aria-live="polite">
      <div>
        <span class="label">점수</span>
        <strong id="score">0</strong>
      </div>
      <div>
        <span class="label">지역</span>
        <strong id="wave">초원</strong>
      </div>
      <div>
        <span class="label">능력</span>
        <strong id="power">파워1 미사일0 보호0</strong>
      </div>
    </section>

    <section class="health">
      <div id="healthBar"></div>
      <span id="healthText">0 / 0</span>
    </section>
    <section class="special-meter" aria-label="스페셜 게이지">
      <div id="specialBar"></div>
    </section>

    <section id="gameOverPanel" class="end-panel" hidden>
      <h2>게임 종료</h2>
      <strong id="finalScore">점수 0</strong>
      <label>
        <span class="label">기록자 이름</span>
        <input id="playerName" type="text" maxlength="14" value="정우" autocomplete="off">
      </label>
      <button id="saveScoreButton" class="primary-action" type="button">점수 저장</button>
      <span class="label">점수 순위</span>
      <ol id="scoreList"></ol>
      <button id="restartButton" class="secondary-action" type="button">다시 하기</button>
    </section>

    <section id="rewardPanel" class="reward-panel" hidden>
      <h2>보스 클리어</h2>
      <p>보상 하나를 선택하세요</p>
      <div id="rewardOptions" class="reward-options"></div>
    </section>

    <div id="moveStick" class="stick" aria-label="이동 조이스틱">
      <div id="moveKnob"></div>
    </div>
    <button id="shootButton" class="shoot" type="button" aria-label="발사">발사</button>
    <button id="specialButton" class="special" type="button" aria-label="스페셜 사용">SP</button>
  </main>

  <script src="./app.js?v=20" defer></script>
</body>
</html>
